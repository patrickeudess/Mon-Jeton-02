<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#087f67"><title>AVEC - Mon Jeton</title>
  <link rel="stylesheet" href="styles.css"><link rel="stylesheet" href="enhanced-styles.css"><link rel="stylesheet" href="theme.css">
  <script src="common.js"></script><script src="tontine.js?v=3.3"></script>
  <style>
    body{background:#f2fbf8}.avec-wrap{max-width:1000px;margin:auto;padding:26px 18px 60px}.avec-hero{padding:28px;border-radius:22px;color:#fff;background:linear-gradient(135deg,#07594b,#00a884);margin-bottom:22px}.avec-hero h1{margin:0 0 8px}.panel{background:#fff;border:1px solid #dcece7;border-radius:18px;padding:20px;margin:18px 0;box-shadow:0 8px 25px rgba(23,53,47,.06)}.avec-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(245px,1fr));gap:16px}.avec-card{padding:18px;border:1px solid #dcece7;border-radius:16px;background:#fff}.avec-card h3{margin:0 0 8px}.amount{font-weight:800;color:#087f67;font-size:1.2rem}.row{display:flex;gap:10px;flex-wrap:wrap}.row>*{flex:1;min-width:140px}.btn{border:0;border-radius:10px;padding:11px 14px;font:inherit;font-weight:700;cursor:pointer}.btn.primary{background:#087f67;color:#fff}.btn.secondary{background:#e8f7f2;color:#07594b}.muted{color:#61716d}.modal{display:none;position:fixed;inset:0;background:#0008;padding:18px;overflow:auto;z-index:1000}.modal.active{display:block}.modal-body{max-width:620px;margin:20px auto;background:#fff;border-radius:16px;padding:22px}.close{float:right;border:0;background:transparent;font-size:1.8rem;cursor:pointer}.activity{padding:10px;border-radius:10px;background:#f3faf7;margin:8px 0}@media(max-width:600px){.avec-wrap{padding:16px 12px}.avec-hero{padding:20px}}
  </style>
</head>
<body>
<script>if(!localStorage.getItem('auth_token')) location.href='login.html';</script>
<nav class="top-nav"><div class="nav-container"><div class="nav-brand"><img src="icon-192.png" alt="Logo" class="nav-logo"><span class="nav-title">💰 Mon Jeton</span></div><div class="nav-user"><span id="display-name">Utilisateur</span><a class="logout-btn" href="index.html">Accueil</a></div></div></nav>
<main class="avec-wrap">
  <header class="avec-hero"><h1>🤝 AVEC</h1><p>Épargnez en parts, créez un fonds social et gérez des petits prêts du groupe en toute transparence.</p></header>
  <section class="panel"><h2>Créer une AVEC</h2><p class="muted">Le groupe décide ensemble de la valeur d’une part, du fonds social et des règles de prêt.</p>
    <form id="avec-form"><div class="row"><label>Nom<input id="name" required placeholder="AVEC des femmes battantes"></label><label>Valeur d’une part<input id="share" type="number" min="100" value="1000" required></label></div><div class="row"><label>Fonds social / membre<input id="social" type="number" min="0" value="100"></label><label>Intérêt mensuel (%)<input id="rate" type="number" min="0" max="100" value="10"></label><label>Durée max.<select id="months"><option value="1">1 mois</option><option value="2">2 mois</option><option value="3" selected>3 mois</option></select></label></div><label>Membres (un par ligne, vous en premier)<textarea id="members" rows="4" placeholder="Moi&#10;Awa&#10;Koffi"></textarea></label><p><button class="btn primary">Créer l’AVEC</button></p></form>
  </section>
  <section class="panel"><h2>Mes AVEC</h2><div id="avec-list" class="avec-grid"></div></section>
</main>
<div id="modal" class="modal"><div class="modal-body"><button class="close" onclick="closeModal()">×</button><div id="modal-content"></div></div></div>
<script src="avec.js?v=1.0"></script>
</body></html>
