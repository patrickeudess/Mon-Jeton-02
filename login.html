<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Mon Jeton</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="enhanced-styles.css">
    <link rel="stylesheet" href="modern-components.css">
    <link rel="stylesheet" href="theme.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #009879 0%, #00b894 100%);
            padding: 20px;
        }

        .auth-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .auth-header {
            margin-bottom: 30px;
        }

        .auth-logo {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .auth-title {
            font-size: 2rem;
            font-weight: bold;
            color: #009879;
            margin-bottom: 10px;
        }

        .auth-subtitle {
            color: #666;
            font-size: 1rem;
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 30px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #e0e0e0;
        }

        .auth-tab {
            flex: 1;
            padding: 15px;
            background: #f8f9fa;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .auth-tab.active {
            background: #009879;
            color: white;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #009879;
        }

        .btn-primary {
            width: 100%;
            padding: 15px;
            background: #009879;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .btn-primary:hover {
            background: #007a63;
            transform: translateY(-2px);
        }

        .social-login {
            margin-top: 30px;
        }

        .social-login-title {
            color: #666;
            margin-bottom: 20px;
            position: relative;
        }

        .social-login-title::before,
        .social-login-title::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30%;
            height: 1px;
            background: #e0e0e0;
        }

        .social-login-title::before {
            left: 0;
        }

        .social-login-title::after {
            right: 0;
        }

        .social-buttons {
            display: grid;
            gap: 15px;
        }

        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            color: #333;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn-social:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .btn-google {
            border-color: #db4437;
            color: #db4437;
        }

        .btn-google:hover {
            background: #db4437;
            color: white;
        }

        .btn-facebook {
            border-color: #4267B2;
            color: #4267B2;
        }

        .btn-facebook:hover {
            background: #4267B2;
            color: white;
        }

        .btn-phone {
            border-color: #25d366;
            color: #25d366;
        }

        .btn-phone:hover {
            background: #25d366;
            color: white;
        }

        .phone-input-container {
            display: none;
            margin-top: 20px;
        }

        .phone-input-container.show {
            display: block;
        }

        .phone-primary-card {
            margin: 0 0 22px;
            padding: 18px;
            border: 1px solid #b9dfd3;
            border-radius: 14px;
            background: linear-gradient(135deg, #effbf7, #f9fffd);
        }

        .phone-primary-card h2 { margin: 0 0 5px; font-size: 1rem; color: #17352f; }
        .phone-primary-card p { margin: 0 0 14px; color: #58716b; font-size: .88rem; }
        .phone-primary-card .btn-primary { margin: 12px 0 0; }
        .service-note { margin: 14px 0 0; color: #58716b; font-size: .82rem; text-align: center; }

        .phone-input-group {
            display: flex;
            gap: 10px;
        }

        .country-code {
            width: 80px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
        }

        .phone-number {
            flex: 1;
        }

        .error-message {
            color: #dc3545;
            font-size: 0.9rem;
            margin-top: 5px;
            display: none;
        }

        .success-message {
            color: #28a745;
            font-size: 0.9rem;
            margin-top: 5px;
            display: none;
        }

        .forgot-password {
            text-align: center;
            margin-top: 20px;
        }

        .forgot-password a {
            color: #009879;
            text-decoration: none;
            font-weight: 600;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 30px 20px;
            }

            .auth-title {
                font-size: 1.5rem;
            }

            .social-buttons {
                grid-template-columns: 1fr;
            }
        }
        /* Refonte de l'accueil de connexion */
        .auth-container {
            background:
                radial-gradient(circle at 10% 15%, rgba(147, 255, 213, .25), transparent 28%),
                radial-gradient(circle at 88% 85%, rgba(98, 211, 184, .22), transparent 25%),
                linear-gradient(135deg, #063a34 0%, #087f67 58%, #12a47f 100%);
        }

        .auth-card {
            max-width: 460px;
            padding: 46px;
            border: 1px solid rgba(255, 255, 255, .65);
            box-shadow: 0 28px 65px rgba(0, 42, 34, .3);
            text-align: left;
        }

        .auth-header { text-align: center; }
        .auth-logo {
            width: 70px;
            height: 70px;
            display: grid;
            place-items: center;
            margin: 0 auto 14px;
            border-radius: 22px;
            background: linear-gradient(145deg, #eafff8, #bcefe0);
            box-shadow: 0 12px 24px rgba(0, 127, 103, .18);
        }
        .auth-title { color: #17352f; font-size: 2rem; letter-spacing: -.04em; }
        .auth-subtitle { color: #58716b; line-height: 1.55; }
        .auth-tabs { border: 0; background: #edf5f2; padding: 4px; border-radius: 13px; gap: 4px; }
        .auth-tab { border-radius: 10px; background: transparent; padding: 12px; color: #58716b; }
        .auth-tab.active { background: #fff; color: #087f67; box-shadow: 0 3px 8px rgba(13, 71, 59, .12); }
        .form-group { margin-bottom: 17px; }
        .form-group label { color: #264840; font-size: .9rem; }
        .form-group input, .country-code {
            border: 1.5px solid #d3e3de;
            background: #fbfefd;
            border-radius: 12px;
            padding: 14px;
        }
        .form-group input:focus { box-shadow: 0 0 0 4px rgba(0, 152, 121, .12); }
        .btn-primary { border-radius: 12px; box-shadow: 0 10px 18px rgba(0, 127, 103, .2); margin-top: 4px; }
        .social-login { border-top: 1px solid #e2ece9; margin-top: 26px; padding-top: 4px; }
        .social-login-title { font-size: .85rem; color: #718781; }
        .btn-social { border-color: #d8e5e1; border-radius: 12px; padding: 13px; }
        .forgot-password { margin-top: 24px; font-size: .9rem; }

        @media (max-width: 480px) {
            .auth-container { padding: 14px; align-items: flex-start; }
            .auth-card { padding: 32px 22px; margin-top: 14px; border-radius: 22px; }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">💰</div>
                <h1 class="auth-title">Mon Jeton</h1>
                <p class="auth-subtitle">Gérez vos jetons intelligemment</p>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchTab('login')">Connexion</button>
                <button class="auth-tab" onclick="switchTab('register')">Inscription</button>
            </div>

            <!-- Formulaire de connexion -->
            <form id="login-form" class="auth-form active">
                <div class="form-group">
                    <label for="login-email">📧 Email :</label>
                    <input type="email" id="login-email" required placeholder="votre@email.com">
                </div>
                <div class="form-group">
                    <label for="login-password">🔒 Mot de passe :</label>
                    <input type="password" id="login-password" required placeholder="Votre mot de passe">
                </div>
                <button type="submit" class="btn-primary">
                    <span class="btn-icon">🚪</span>
                    Se connecter
                </button>
                <div class="error-message" id="login-error"></div>
                <div class="success-message" id="login-success"></div>
            </form>

            <!-- Formulaire d'inscription -->
            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <label for="register-name">👤 Nom complet :</label>
                    <input type="text" id="register-name" required placeholder="Votre nom complet">
                </div>
                <div class="form-group">
                    <label for="register-email">📧 Email :</label>
                    <input type="email" id="register-email" required placeholder="votre@email.com">
                </div>
                <div class="form-group">
                    <label for="register-password">🔒 Mot de passe :</label>
                    <input type="password" id="register-password" required placeholder="Créez un mot de passe">
                </div>
                <div class="form-group">
                    <label for="register-confirm-password">🔒 Confirmer le mot de passe :</label>
                    <input type="password" id="register-confirm-password" required placeholder="Confirmez votre mot de passe">
                </div>
                <button type="submit" class="btn-primary">
                    <span class="btn-icon">📝</span>
                    Créer un compte
                </button>
                <div class="error-message" id="register-error"></div>
                <div class="success-message" id="register-success"></div>
            </form>

            <!-- Connexion par téléphone : méthode principale -->
            <section class="phone-primary-card" aria-labelledby="phone-login-title">
                <h2 id="phone-login-title">📱 Connexion par numéro</h2>
                <p>Recevez un code de connexion par SMS. Aucun mot de passe à retenir.</p>
                <div class="phone-input-group">
                    <select class="country-code" id="country-code" aria-label="Indicatif pays">
                        <option value="+225">🇨🇮 +225</option>
                        <option value="+221">🇸🇳 +221</option>
                        <option value="+237">🇨🇲 +237</option>
                        <option value="+234">🇳🇬 +234</option>
                        <option value="+33">🇫🇷 +33</option>
                    </select>
                    <input type="tel" id="phone-number" class="phone-number" inputmode="tel" autocomplete="tel" placeholder="Votre numéro">
                </div>
                <button type="button" class="btn-primary" onclick="sendPhoneCode()">Recevoir mon code</button>
                <div class="error-message" id="phone-error"></div>
                <div class="success-message" id="phone-success"></div>
            </section>

            <!-- Connexion alternative -->
            <div class="social-login">
                <div class="social-login-title">Autres options</div>
                <div class="social-buttons">
                    <button type="button" class="btn-social btn-google" disabled title="Disponible prochainement">
                        <span class="social-icon">🔍</span>
                        <span>Continuer avec Google, bientôt disponible</span>
                    </button>
                </div>
                <p class="service-note">La connexion par e-mail reste disponible dans l’onglet Connexion.</p>
            </div>

            <div class="forgot-password">
                <a href="#" onclick="showForgotPassword()">Mot de passe oublié ?</a>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js?v=2"></script>
    <script src="firebase-groups.js?v=2"></script>
    <script src="firebase-private-data.js?v=1"></script>
    <script src="api-client.js?v=2.5"></script>
    <script src="auth-manager.js"></script>
    <script src="optimize_application.js"></script>
    <script>
        // Gestion des onglets
        function switchTab(tab) {
            // Mettre à jour les onglets
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            
            const clickedTab = window.event && window.event.currentTarget;
            if (clickedTab) clickedTab.classList.add('active');
            document.getElementById(tab + '-form').classList.add('active');
            
            // Masquer les messages d'erreur
            document.querySelectorAll('.error-message, .success-message').forEach(msg => {
                msg.style.display = 'none';
            });
        }

        // Envoyer le code par SMS : l'interface est prête, l'envoi réel
        // nécessite la configuration sécurisée d'un fournisseur SMS côté serveur.
        function sendPhoneCode() {
            const countryCode = document.getElementById('country-code').value;
            const phoneNumber = document.getElementById('phone-number').value;
            
            if (!phoneNumber) {
                showError('phone-error', 'Veuillez entrer votre numéro de téléphone');
                return;
            }

            showError('phone-error', `L’envoi de SMS au ${countryCode}${phoneNumber} sera activé dès que le service SMS sera configuré.`);
        }

        // Gérer la connexion sociale
        function handleSocialLogin(user, provider) {
            // Sauvegarder les informations utilisateur
            localStorage.setItem('auth_token', 'social_' + user.id);
            localStorage.setItem('user_name', user.name);
            localStorage.setItem('user_email', user.email || user.phone);
            localStorage.setItem('login_provider', provider);
            
            showSuccess('login-success', `Connexion réussie avec ${provider}`);
            
            // Rediriger vers l'application
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
        }

        // Un backend est-il configuré ? (voir api-client.js)
        function backendAvailable() {
            return typeof api !== 'undefined' && !!api.baseURL;
        }

        // Session locale sans backend : les données restent dans localStorage.
        function createLocalSession(name, email) {
            localStorage.setItem('auth_token', 'local_' + Date.now());
            localStorage.setItem('user_name', name);
            localStorage.setItem('user_email', email);
            localStorage.setItem('login_provider', 'Local');
        }

        function createFirebaseSession(user) {
            localStorage.setItem('auth_token', 'firebase_' + user.uid);
            localStorage.setItem('user_name', user.displayName || (user.email || '').split('@')[0] || 'Utilisateur');
            localStorage.setItem('user_email', user.email || '');
            localStorage.setItem('login_provider', 'Firebase');
        }

        // Gestion du formulaire de connexion
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            if (!email || !password) {
                showError('login-error', 'Veuillez remplir tous les champs');
                return;
            }

            if (window.FirebaseGroups && FirebaseGroups.configured()) {
                try {
                    showSuccess('login-success', 'Connexion sécurisée en cours…');
                    const user = await FirebaseGroups.signIn(email, password);
                    createFirebaseSession(user);
                    window.location.href = 'index.html';
                } catch (error) {
                    showError('login-error', 'Connexion impossible : ' + (error.message || 'vérifiez vos informations.'));
                }
                return;
            }

            if (backendAvailable()) {
                // Authentification réelle via l'API (JWT)
                try {
                    showSuccess('login-success', 'Connexion en cours...');
                    await api.login(email, password);
                    const user = await api.getCurrentUser();
                    localStorage.setItem('user_name', user.full_name || user.username);
                    localStorage.setItem('user_email', user.email);
                    localStorage.setItem('login_provider', 'API');
                    window.location.href = 'index.html';
                } catch (error) {
                    showError('login-error', `Connexion impossible : ${error.message}`);
                }
                return;
            }

            // Aucun backend configuré : mode hors ligne assumé
            showSuccess('login-success', 'Mode hors ligne : session locale créée');
            createLocalSession(email.split('@')[0], email);
            setTimeout(() => { window.location.href = 'index.html'; }, 800);
        });

        // Gestion du formulaire d'inscription
        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const name = document.getElementById('register-name').value.trim();
            const email = document.getElementById('register-email').value.trim();
            const password = document.getElementById('register-password').value;
            const confirmPassword = document.getElementById('register-confirm-password').value;

            if (password !== confirmPassword) {
                showError('register-error', 'Les mots de passe ne correspondent pas');
                return;
            }

            if (password.length < 6) {
                showError('register-error', 'Le mot de passe doit contenir au moins 6 caractères');
                return;
            }

            if (window.FirebaseGroups && FirebaseGroups.configured()) {
                try {
                    const user = await FirebaseGroups.register(name, email, password);
                    createFirebaseSession(user);
                    showSuccess('register-success', 'Compte créé. Vos groupes peuvent maintenant être synchronisés.');
                    setTimeout(() => { window.location.href = 'index.html'; }, 800);
                } catch (error) {
                    showError('register-error', 'Inscription impossible : ' + (error.message || 'réessayez.'));
                }
                return;
            }

            if (backendAvailable()) {
                // Inscription réelle via l'API, puis connexion automatique.
                // L'email sert d'identifiant de connexion (username côté API).
                try {
                    await api.register({ email: email, username: email, full_name: name, password: password });
                    await api.login(email, password);
                    localStorage.setItem('user_name', name);
                    localStorage.setItem('user_email', email);
                    localStorage.setItem('login_provider', 'API');
                    showSuccess('register-success', 'Compte créé avec succès !');
                    setTimeout(() => { window.location.href = 'index.html'; }, 800);
                } catch (error) {
                    showError('register-error', `Inscription impossible : ${error.message}`);
                }
                return;
            }

            // Aucun backend configuré : mode hors ligne assumé
            showSuccess('register-success', 'Mode hors ligne : compte local créé');
            createLocalSession(name, email);
            setTimeout(() => { window.location.href = 'index.html'; }, 800);
        });

        // Fonctions utilitaires
        function showError(elementId, message) {
            const errorElement = document.getElementById(elementId);
            errorElement.textContent = message;
            errorElement.style.display = 'block';
            
            // Masquer après 5 secondes
            setTimeout(() => {
                errorElement.style.display = 'none';
            }, 5000);
        }

        function showSuccess(elementId, message) {
            const successElement = document.getElementById(elementId);
            successElement.textContent = message;
            successElement.style.display = 'block';
            
            // Masquer après 3 secondes
            setTimeout(() => {
                successElement.style.display = 'none';
            }, 3000);
        }

        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.innerHTML = `
                <span class="notification-icon">${type === 'success' ? '✅' : 'ℹ️'}</span>
                <span class="notification-text">${message}</span>
            `;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.classList.add('show');
            }, 100);
            
            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => {
                    document.body.removeChild(notification);
                }, 300);
            }, 3000);
        }

        function showForgotPassword() {
            const email = prompt('Entrez votre adresse email pour réinitialiser le mot de passe :');
            if (email) {
                if (window.FirebaseGroups && FirebaseGroups.configured()) {
                    FirebaseGroups.resetPassword(email)
                        .then(() => showNotification('Email de réinitialisation envoyé !', 'success'))
                        .catch(error => showNotification(error.message || 'Envoi impossible.', 'error'));
                } else {
                    showNotification('Email de réinitialisation envoyé !', 'success');
                }
            }
        }

        // Initialisation
        document.addEventListener('DOMContentLoaded', function() {
            // Vérifier si l'utilisateur est déjà connecté
            const token = localStorage.getItem('auth_token');
            if (token) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
