<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#009879">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Mon Jeton">
    <title>Transactions - Mon Jeton</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="enhanced-styles.css">
    <link rel="stylesheet" href="modern-components.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script src="plotly.js"></script>
    <style>
        .transactions-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #009879 0%, #00b894 100%);
            color: white;
            border-radius: 20px;
        }

        .transaction-form-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
        }

        .form-group select,
        .form-group input,
        .form-group textarea {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }

        .form-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn-primary,
        .btn-secondary {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-primary {
            background: #009879;
            color: white;
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #333;
            border: 2px solid #e0e0e0;
        }

        .transactions-table-container {
            margin-top: 20px;
            overflow-x: auto;
        }

        .transactions-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .transactions-table th {
            background: #009879;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: bold;
        }

        .transactions-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #f0f0f0;
        }

        .transactions-table tr:hover {
            background: #f8f9fa;
        }

        .transaction-type-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .transaction-type-badge.revenu {
            background: #d4edda;
            color: #155724;
        }

        .transaction-type-badge.depense {
            background: #f8d7da;
            color: #721c24;
        }

        .transaction-amount {
            font-weight: bold;
        }

        .transaction-amount.revenu {
            color: #28a745;
        }

        .transaction-amount.depense {
            color: #dc3545;
        }

        .transaction-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            padding: 6px 10px;
            border: none;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .action-btn.edit {
            background: #009879;
            color: white;
        }

        .action-btn.edit:hover {
            background: #007a63;
        }

        .action-btn.delete {
            background: #dc3545;
            color: white;
        }

        .action-btn.delete:hover {
            background: #c82333;
        }

        .refresh-btn {
            background: #17a2b8;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .refresh-btn:hover {
            background: #138496;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        /* Styles pour la grille d'icônes 3x3 */
        .transactions-grid {
            padding: 20px;
            background: white;
            border-radius: 15px;
            margin: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .transactions-grid h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #009879;
            font-size: 2rem;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        .grid-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .grid-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            border-color: #009879;
        }

        .grid-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #009879, #00d4aa);
        }

        .card-icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
            display: block;
        }

        .card-content h3 {
            margin: 0 0 10px 0;
            color: #333;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .card-value {
            font-size: 1.1rem;
            font-weight: bold;
            color: #009879;
            margin-bottom: 5px;
        }

        .card-subtitle {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.3;
        }

        .card-arrow {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 1.5rem;
            color: #009879;
            opacity: 0.7;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .grid-container {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
            
            .grid-card {
                padding: 20px;
            }
            
            .card-icon {
                font-size: 2rem;
            }
        }

        @media (max-width: 480px) {
            .grid-container {
                grid-template-columns: 1fr;
                gap: 15px;
            }
        }

        /* Animation d'entrée */
        .grid-card {
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Délai d'animation pour chaque carte */
        .grid-card:nth-child(1) { animation-delay: 0.1s; }
        .grid-card:nth-child(2) { animation-delay: 0.2s; }
        .grid-card:nth-child(3) { animation-delay: 0.3s; }
        .grid-card:nth-child(4) { animation-delay: 0.4s; }
        .grid-card:nth-child(5) { animation-delay: 0.5s; }
        .grid-card:nth-child(6) { animation-delay: 0.6s; }
        .grid-card:nth-child(7) { animation-delay: 0.7s; }
        .grid-card:nth-child(8) { animation-delay: 0.8s; }
        .grid-card:nth-child(9) { animation-delay: 0.9s; }
    </style>
</head>
<body>
    <!-- Vérification d'authentification -->
    <script>
        function checkAuth() {
            const token = localStorage.getItem('auth_token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }
        }
        checkAuth();
    </script>

    <!-- Barre de navigation -->
    <nav class="top-nav">
        <div class="nav-container">
            <div class="nav-brand">
                <img src="icon-192.png" alt="Logo" class="nav-logo">
                <span class="nav-title">💰 Mon Jeton</span>
            </div>
            <div class="nav-user">
                <div id="connection-status" class="connection-status">
                    <span class="status-indicator offline">🔴 Hors ligne</span>
                </div>
                <div id="user-info" class="user-info">
                    <span id="user-name" class="user-name">👤 <span id="display-name">Utilisateur</span></span>

                </div>
            </div>
        </div>

    <nav class="breadcrumb">
        <a href="index.html">🏠 Accueil</a> > <span>📝 Transactions</span>
    </nav>

    <div class="main-container">
        <!-- Contenu de la page -->
        <section class="transaction-content" id="transaction-content">
            <div class="transactions-container">
                <div class="page-header">
                    <h1>💳 Transactions</h1>
                    <p>Gérez vos revenus et dépenses</p>
                </div>

                <section class="transaction-form-section">
                    <h2>➕ Nouvelle Transaction</h2>
                    <form id="transaction-form">
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="transaction-type">📊 Type *</label>
                                <select id="transaction-type" name="transaction-type" required>
                                    <option value="">Sélectionnez le type</option>
                                    <option value="revenu">📈 Revenu</option>
                                    <option value="depense">📉 Dépense</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label for="transaction-category">📂 Catégorie *</label>
                                <select id="transaction-category" name="transaction-category" required>
                                    <option value="">Sélectionnez une catégorie</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label for="transaction-amount">💵 Montant (FCFA) *</label>
                                <input type="number" id="transaction-amount" name="transaction-amount" required placeholder="50000" min="0">
                            </div>
                            
                            <div class="form-group">
                                <label for="transaction-date">📅 Date *</label>
                                <input type="date" id="transaction-date" name="transaction-date" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="payment-method">💳 Méthode de Paiement *</label>
                                <select id="payment-method" name="payment-method" required>
                                    <option value="">Sélectionnez la méthode</option>
                                    <option value="especes">💵 Espèces</option>
                                    <option value="carte">💳 Carte bancaire</option>
                                    <option value="mobile_money">📱 Mobile Money</option>
                                    <option value="virement">🏦 Virement</option>
                                    <option value="cheque">📄 Chèque</option>
                                    <option value="autre">📋 Autre</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label for="transaction-description">📝 Description (optionnel)</label>
                                <textarea id="transaction-description" name="transaction-description" placeholder="Décrivez cette transaction" rows="3"></textarea>
                            </div>
                        </div>
                        
                        <div class="form-actions">
                            <button type="submit" class="btn-primary">💾 Enregistrer</button>
                            <button type="reset" class="btn-secondary">🔄 Réinitialiser</button>
                        </div>
                    </form>
                </section>

                <section class="transaction-form-section">
                    <h2>📋 Historique des Transactions</h2>
                    <button onclick="refreshTransactions()" class="refresh-btn">
                        🔄 Actualiser la liste
                    </button>
                    <div class="transactions-table-container">
                        <table id="transactions-table" class="transactions-table">
                            <thead>
                                <tr>
                                    <th>📅 Date</th>
                                    <th>📊 Type</th>
                                    <th>📂 Catégorie</th>
                                    <th>💵 Montant</th>
                                    <th>💳 Méthode</th>
                                    <th>📝 Description</th>
                                    <th>⚙️ Actions</th>
                                </tr>
                            </thead>
                            <tbody id="transactions-table-body">
                                <!-- Les transactions seront chargées ici -->
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </section>
    </div>

    <!-- Script de débogage -->
    <script src="test_transactions_debug.js"></script>

    <script>
        // Initialiser les catégories
        function initializeCategories() {
            const categorySelect = document.getElementById('transaction-category');
            const allCategories = [
                { value: 'Salaire', text: '💼 Salaire' },
                { value: 'Freelance', text: '💻 Freelance' },
                { value: 'Commerce', text: '🏪 Commerce' },
                { value: 'Investissement', text: '📈 Investissement' },
                { value: 'Bonus', text: '🎁 Bonus' },
                { value: 'Aide familiale', text: '👨‍👩‍👧‍👦 Aide familiale' },
                { value: 'Autre revenu', text: '📋 Autre revenu' },
                { value: 'Alimentation', text: '🍽️ Alimentation' },
                { value: 'Transport', text: '🚗 Transport' },
                { value: 'Logement', text: '🏠 Logement' },
                { value: 'Santé', text: '🏥 Santé' },
                { value: 'Éducation', text: '📚 Éducation' },
                { value: 'Loisirs', text: '🎮 Loisirs' },
                { value: 'Vêtements', text: '👕 Vêtements' },
                { value: 'Factures', text: '📄 Factures' },
                { value: 'Communication', text: '📱 Communication' },
                { value: 'Aide financière', text: '🤝 Aide financière' },
                { value: 'Événement coutumier', text: '🎭 Événement coutumier' },
                { value: 'Dîmes et offrandes', text: '🕌 Dîmes et offrandes' },
                { value: 'Autre dépense', text: '📋 Autre dépense' }
            ];
            
            allCategories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat.value;
                option.textContent = cat.text;
                categorySelect.appendChild(option);
            });
        }

        // Gérer le changement de type
        document.getElementById('transaction-type').addEventListener('change', function() {
            const type = this.value;
            const categorySelect = document.getElementById('transaction-category');
            
            // Vider les options existantes
            const options = categorySelect.querySelectorAll('option');
            for (let i = 1; i < options.length; i++) {
                options[i].remove();
            }
            
            if (type === 'revenu') {
                const revenuCategories = [
                    { value: 'Salaire', text: '💼 Salaire' },
                    { value: 'Freelance', text: '💻 Freelance' },
                    { value: 'Commerce', text: '🏪 Commerce' },
                    { value: 'Investissement', text: '📈 Investissement' },
                    { value: 'Bonus', text: '🎁 Bonus' },
                    { value: 'Aide familiale', text: '👨‍👩‍👧‍👦 Aide familiale' },
                    { value: 'Autre revenu', text: '📋 Autre revenu' }
                ];
                
                revenuCategories.forEach(cat => {
                    const option = document.createElement('option');
                    option.value = cat.value;
                    option.textContent = cat.text;
                    categorySelect.appendChild(option);
                });
            } else if (type === 'depense') {
                const depenseCategories = [
                    { value: 'Alimentation', text: '🍽️ Alimentation' },
                    { value: 'Transport', text: '🚗 Transport' },
                    { value: 'Logement', text: '🏠 Logement' },
                    { value: 'Santé', text: '🏥 Santé' },
                    { value: 'Éducation', text: '📚 Éducation' },
                    { value: 'Loisirs', text: '🎮 Loisirs' },
                    { value: 'Vêtements', text: '👕 Vêtements' },
                    { value: 'Factures', text: '📄 Factures' },
                    { value: 'Communication', text: '📱 Communication' },
                    { value: 'Aide familiale', text: '👨‍👩‍👧‍👦 Aide familiale' },
                    { value: 'Aide financière', text: '🤝 Aide financière' },
                    { value: 'Événement coutumier', text: '🎭 Événement coutumier' },
                    { value: 'Dîmes et offrandes', text: '🕌 Dîmes et offrandes' },
                    { value: 'Autre dépense', text: '📋 Autre dépense' }
                ];
                
                depenseCategories.forEach(cat => {
                    const option = document.createElement('option');
                    option.value = cat.value;
                    option.textContent = cat.text;
                    categorySelect.appendChild(option);
                });
            }
        });

        // Gérer le formulaire
        document.getElementById('transaction-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            console.log('=== SOUMISSION DU FORMULAIRE ===');
            
            // Récupérer les valeurs directement des éléments
            const type = document.getElementById('transaction-type').value;
            const category = document.getElementById('transaction-category').value;
            const amount = document.getElementById('transaction-amount').value;
            const date = document.getElementById('transaction-date').value;
            const description = document.getElementById('transaction-description').value;
            const paymentMethod = document.getElementById('payment-method').value;
            
            console.log('Valeurs récupérées:', {
                type, category, amount, date, description, paymentMethod
            });
            
            // Validation
            if (!type || !category || !amount || !date || !paymentMethod) {
                alert('Veuillez remplir tous les champs obligatoires !');
                return;
            }
            
            const transaction = {
                id: Date.now().toString(),
                type: type,
                amount: parseFloat(amount),
                category: category,
                date: date,
                description: description,
                paymentMethod: paymentMethod,
                createdAt: new Date().toISOString()
            };
            
            console.log('Transaction créée:', transaction);

            // Sauvegarder la transaction
            const transactions = JSON.parse(localStorage.getItem('transactions') || '[]');
            transactions.push(transaction);
            localStorage.setItem('transactions', JSON.stringify(transactions));
            
            console.log('Transactions sauvegardées:', transactions);

            // Recharger l'affichage
            loadTransactions();

            // Réinitialiser le formulaire
            e.target.reset();
            
            // Réinitialiser les catégories
            initializeCategories();
            
            alert('Transaction ajoutée avec succès !');
        });

        // Charger les transactions
        function loadTransactions() {
            console.log('=== CHARGEMENT DES TRANSACTIONS ===');
            const transactions = JSON.parse(localStorage.getItem('transactions') || '[]');
            console.log('Transactions trouvées dans localStorage:', transactions);
            console.log('Nombre de transactions:', transactions.length);
            displayTransactions(transactions);
        }

        // Actualiser les transactions
        function refreshTransactions() {
            loadTransactions();
            alert('Liste actualisée !');
        }

        // Afficher les transactions en tableau
        function displayTransactions(transactions) {
            console.log('=== AFFICHAGE DES TRANSACTIONS ===');
            const tbody = document.getElementById('transactions-table-body');
            
            console.log('Container tbody trouvé:', !!tbody);
            console.log('Transactions à afficher:', transactions);
            
            if (transactions.length === 0) {
                console.log('Aucune transaction à afficher');
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" class="empty-state">
                            <h3>📋 Aucune transaction</h3>
                            <p>Commencez par ajouter votre première transaction</p>
                        </td>
                    </tr>
                `;
                return;
            }

            // Trier les transactions par date (plus récentes en premier)
            transactions.sort((a, b) => new Date(b.date) - new Date(a.date));
            console.log('Transactions triées:', transactions);

            const htmlContent = transactions.map(transaction => createTransactionRow(transaction)).join('');
            console.log('HTML généré:', htmlContent);
            tbody.innerHTML = htmlContent;
            console.log('Affichage mis à jour');
        }

        // Créer une ligne de transaction
        function createTransactionRow(transaction) {
            const typeClass = transaction.type === 'revenu' ? 'revenu' : 'depense';
            const typeIcon = transaction.type === 'revenu' ? '📈' : '📉';
            const typeText = transaction.type === 'revenu' ? 'Revenu' : 'Dépense';
            const amountPrefix = transaction.type === 'revenu' ? '+' : '-';
            
            return `
                <tr>
                    <td>${formatDate(transaction.date)}</td>
                    <td>
                        <span class="transaction-type-badge ${typeClass}">
                            ${typeIcon} ${typeText}
                        </span>
                    </td>
                    <td>${transaction.category}</td>
                    <td class="transaction-amount ${typeClass}">
                        ${amountPrefix}${formatAmount(transaction.amount)} FCFA
                    </td>
                    <td>${getPaymentMethodText(transaction.paymentMethod)}</td>
                    <td>${transaction.description || '-'}</td>
                    <td>
                        <div class="transaction-actions">
                            <button class="action-btn edit" onclick="editTransaction('${transaction.id}')">
                                ✏️ Éditer
                            </button>
                            <button class="action-btn delete" onclick="deleteTransaction('${transaction.id}')">
                                🗑️ Supprimer
                            </button>
                        </div>
                    </td>
                </tr>
            `;
        }

        // Éditer une transaction
        function editTransaction(transactionId) {
            const transactions = JSON.parse(localStorage.getItem('transactions') || '[]');
            const transaction = transactions.find(t => t.id === transactionId);
            
            if (!transaction) {
                alert('Transaction non trouvée');
                return;
            }

            // Remplir le formulaire avec les données de la transaction
            document.getElementById('transaction-type').value = transaction.type;
            document.getElementById('transaction-type').dispatchEvent(new Event('change'));
            
            setTimeout(() => {
                document.getElementById('transaction-category').value = transaction.category;
                document.getElementById('transaction-amount').value = transaction.amount;
                document.getElementById('transaction-date').value = transaction.date;
                document.getElementById('payment-method').value = transaction.paymentMethod;
                document.getElementById('transaction-description').value = transaction.description || '';
                
                // Modifier le bouton pour sauvegarder les modifications
                const submitBtn = document.querySelector('#transaction-form button[type="submit"]');
                submitBtn.textContent = '💾 Mettre à jour';
                submitBtn.onclick = function(e) {
                    e.preventDefault();
                    updateTransaction(transactionId);
                };
                
                // Faire défiler vers le formulaire
                document.querySelector('.transaction-form-section').scrollIntoView({ behavior: 'smooth' });
                
                alert('Modifiez les informations et cliquez sur "Mettre à jour"');
            }, 100);
        }

        // Mettre à jour une transaction
        function updateTransaction(transactionId) {
            const formData = new FormData(document.getElementById('transaction-form'));
            const updatedTransaction = {
                id: transactionId,
                type: formData.get('transaction-type'),
                amount: parseFloat(formData.get('transaction-amount')),
                category: formData.get('transaction-category'),
                date: formData.get('transaction-date'),
                description: formData.get('transaction-description'),
                paymentMethod: formData.get('payment-method'),
                createdAt: new Date().toISOString()
            };

            // Mettre à jour la transaction
            const transactions = JSON.parse(localStorage.getItem('transactions') || '[]');
            const index = transactions.findIndex(t => t.id === transactionId);
            
            if (index !== -1) {
                transactions[index] = updatedTransaction;
                localStorage.setItem('transactions', JSON.stringify(transactions));
                
                // Recharger l'affichage
                loadTransactions();
                
                // Réinitialiser le formulaire
                document.getElementById('transaction-form').reset();
                
                // Remettre le bouton en mode normal
                const submitBtn = document.querySelector('#transaction-form button[type="submit"]');
                submitBtn.textContent = '💾 Enregistrer';
                submitBtn.onclick = null;
                
                alert('Transaction mise à jour avec succès !');
            }
        }

        // Supprimer une transaction
        function deleteTransaction(transactionId) {
            if (confirm('Êtes-vous sûr de vouloir supprimer cette transaction ?')) {
                const transactions = JSON.parse(localStorage.getItem('transactions') || '[]');
                const updatedTransactions = transactions.filter(t => t.id !== transactionId);
                localStorage.setItem('transactions', JSON.stringify(updatedTransactions));
                loadTransactions();
                alert('Transaction supprimée avec succès');
            }
        }

        // Fonctions utilitaires
        function formatAmount(amount) {
            return new Intl.NumberFormat('fr-FR').format(amount);
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('fr-FR');
        }

        function getPaymentMethodText(method) {
            const methods = {
                'especes': '💵 Espèces',
                'carte': '💳 Carte bancaire',
                'mobile_money': '📱 Mobile Money',
                'virement': '🏦 Virement',
                'cheque': '📄 Chèque',
                'autre': '📋 Autre'
            };
            return methods[method] || method;
        }
